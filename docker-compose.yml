services:
  # The Backend Service
  api:
    build: ./backend # Path to your backend folder
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app # This enables Hot Reloading!
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db

  # One-off seeding job (run only when requested)
  seed:
    build: ./backend
    volumes:
      - ./backend:/app
    command: python seed_super_admins.py
    depends_on:
      - db
    restart: "no"
    profiles:
      - seed

  # The Frontend Service
  web:
    build: ./frontend/erma-frontend # Path to your frontend folder
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api

  # The Database Service
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: crms_db
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

volumes:
  db_data:
